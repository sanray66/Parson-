version: '3.8'

networks:
  dev:

volumes:
  postgres_data:

services:
  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80" 
    volumes:
      - './nginx.conf:/etc/nginx/nginx.conf'
      - './frontend/out:/usr/share/nginx/html'
    depends_on:
      - backend
    networks:
      - dev

  backend: 
    build: 
      context: ./backend 
    env_file:
      - .env  
    networks:
      - dev

  frontend: 
    build:
      context: ./frontend 
    ports:
      - "3000:3000" 
    networks:
      - dev

  postgres:
    image: postgres:16-alpine
    container_name: postgres_db
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - dev